<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nithin M | Electrical & Embedded Systems Engineer</title>
<meta name="description" content="Portfolio of Nithin M — Electrical and Electronics Engineering student specializing in Embedded Systems, IoT, and Power Systems."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ====== RESET & BASE ====== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#00d4ff15 #06142E}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#06142E}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#00d4ff,#0066ff);border-radius:3px}
body{
  font-family:'Poppins',sans-serif;
  background:#06142E;
  color:#C6C6C6;
  overflow-x:hidden;
  cursor:none;
  line-height:1.7;
}
a{color:inherit;text-decoration:none}
/* ====== CUSTOM CURSOR ====== */
#custom-cursor{
  position:fixed;top:0;left:0;
  width:24px;height:24px;
  pointer-events:none;z-index:100000;
  transition:transform .15s ease;
  mix-blend-mode:screen;
}
#cursor-trail{
  position:fixed;top:0;left:0;
  pointer-events:none;z-index:99999;
}
.trail-dot{
  position:absolute;
  width:4px;height:4px;
  background:#00d4ff;
  border-radius:50%;
  pointer-events:none;
  box-shadow:0 0 6px #00d4ff,0 0 12px #00d4ff80;
  opacity:0;
  transition:opacity .3s;
}
/* ====== PARTICLES CANVAS ====== */
#particles-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
}
/* ====== CIRCUIT BG ====== */
#circuit-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;opacity:.12;
}
/* ====== FLOATING GLOW SHAPES ====== */
.glow-shape{
  position:fixed;border-radius:50%;
  filter:blur(80px);opacity:.08;
  pointer-events:none;z-index:0;
  animation:floatShape 20s ease-in-out infinite;
}
@keyframes floatShape{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-40px) scale(1.1)}
  50%{transform:translate(-20px,30px) scale(.95)}
  75%{transform:translate(40px,20px) scale(1.05)}
}
/* ====== NAVBAR ====== */
.navbar{
  position:fixed;top:0;left:0;right:0;
  height:70px;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  background:rgba(6,20,46,.6);
  border-bottom:1px solid rgba(0,212,255,.1);
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.navbar.scrolled{
  background:rgba(6,20,46,.85);
  box-shadow:0 4px 30px rgba(0,212,255,.1);
  height:60px;
}
.nav-inner{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:1400px;padding:0 40px;
}
.nav-logo{
  font-family:'Orbitron',sans-serif;
  font-weight:700;font-size:1.3rem;
  background:linear-gradient(135deg,#00d4ff,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
.nav-logo span{color:#ffcc00;-webkit-text-fill-color:#ffcc00}
.nav-links{display:flex;gap:8px;list-style:none}
.nav-link{
  position:relative;padding:8px 18px;
  font-size:.82rem;font-weight:500;letter-spacing:.5px;
  color:#C6C6C6;cursor:none;
  border-radius:8px;
  transition:all .3s ease;
  text-transform:uppercase;
}
.nav-link:hover,.nav-link.active{
  color:#00d4ff;
  background:rgba(0,212,255,.08);
}
.nav-link.active::after{
  content:'';position:absolute;bottom:2px;left:50%;
  transform:translateX(-50%);
  width:20px;height:2px;
  background:#00d4ff;border-radius:1px;
  box-shadow:0 0 8px #00d4ff;
}
.scroll-indicator{
  position:fixed;top:0;left:0;height:2px;
  background:linear-gradient(90deg,#00d4ff,#0066ff,#ffcc00);
  z-index:1001;transition:width .1s linear;
  box-shadow:0 0 10px #00d4ff80;
}
/* ====== MOBILE NAV ====== */
.nav-toggle{
  display:none;flex-direction:column;gap:5px;
  cursor:none;background:none;border:none;padding:8px;
}
.nav-toggle span{
  width:24px;height:2px;background:#00d4ff;
  border-radius:1px;transition:all .3s ease;
}
@media(max-width:768px){
  .nav-toggle{display:flex}
  .nav-links{
    position:fixed;top:60px;left:0;right:0;
    flex-direction:column;align-items:center;
    background:rgba(6,20,46,.95);
    backdrop-filter:blur(20px);
    padding:30px 0;gap:4px;
    transform:translateY(-120%);
    transition:transform .4s cubic-bezier(.4,0,.2,1);
    border-bottom:1px solid rgba(0,212,255,.1);
  }
  .nav-links.open{transform:translateY(0)}
}
/* ====== SECTION BASE ====== */
.section{
  position:relative;
  min-height:100vh;
  padding:120px 40px 80px;
  z-index:1;
}
.section-inner{
  max-width:1200px;margin:0 auto;
}
.section-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.6rem,3vw,2.4rem);
  font-weight:700;color:#fff;
  text-transform:uppercase;
  letter-spacing:3px;
  margin-bottom:60px;
  text-align:center;
  position:relative;
}
.section-title::after{
  content:'';display:block;
  width:80px;height:3px;
  background:linear-gradient(90deg,#00d4ff,#0066ff);
  margin:16px auto 0;border-radius:2px;
  box-shadow:0 0 15px #00d4ff80;
  animation:glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 15px #00d4ff80;width:80px}
  50%{box-shadow:0 0 25px #00d4ff;width:120px}
}
/* ====== HERO ====== */
.hero{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding-top:70px;position:relative;overflow:hidden;
}
.hero-content{
  display:flex;align-items:center;gap:80px;
  max-width:1200px;width:100%;padding:0 40px;z-index:2;
}
.hero-text{flex:1}
.hero-greeting{
  font-family:'Share Tech Mono',monospace;
  font-size:.9rem;color:#00d4ff;
  letter-spacing:3px;margin-bottom:12px;
  opacity:.8;
}
.hero-greeting::before{content:'> '}
.hero-name{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2.5rem,5vw,4.5rem);
  font-weight:900;color:#fff;
  line-height:1.1;margin-bottom:20px;
  text-shadow:0 0 40px rgba(0,212,255,.3);
}
.hero-name .highlight{
  background:linear-gradient(135deg,#00d4ff,#0066ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-role{
  font-size:clamp(1rem,2vw,1.4rem);
  font-weight:300;color:#C6C6C6;
  margin-bottom:30px;min-height:42px;
}
.typed-text{color:#00d4ff;font-weight:500}
.typed-cursor{
  display:inline-block;width:3px;height:1.2em;
  background:#00d4ff;margin-left:4px;
  animation:blink .8s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero-desc{
  font-size:.95rem;color:#8a9bb5;
  max-width:500px;margin-bottom:40px;line-height:1.8;
}
.hero-cta{display:flex;gap:16px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:12px;
  font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;
  cursor:none;border:none;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
  text-transform:uppercase;letter-spacing:1px;
}
.btn-primary{
  background:linear-gradient(135deg,rgba(0,100,255,.3),rgba(0,212,255,.2));
  color:#00d4ff;
  border:1px solid rgba(0,212,255,.3);
  backdrop-filter:blur(10px);
}
.btn-primary:hover{
  background:linear-gradient(135deg,rgba(0,100,255,.5),rgba(0,212,255,.4));
  border-color:#00d4ff;
  box-shadow:0 0 30px rgba(0,212,255,.3);
  transform:translateY(-2px);
}
.btn-secondary{
  background:transparent;
  color:#C6C6C6;
  border:1px solid rgba(198,198,198,.2);
}
.btn-secondary:hover{
  border-color:#ffcc00;color:#ffcc00;
  box-shadow:0 0 20px rgba(255,204,0,.15);
  transform:translateY(-2px);
}
/* Hero Image */
.hero-image-wrapper{
  flex-shrink:0;position:relative;
  width:320px;height:320px;
}
.hero-image-frame{
  width:100%;height:100%;border-radius:50%;
  background:conic-gradient(from 0deg,#00d4ff,#0066ff,#00d4ff00,#ffcc00,#00d4ff);
  padding:4px;animation:rotateFrame 8s linear infinite;
  position:relative;
}
@keyframes rotateFrame{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.hero-image-inner{
  width:100%;height:100%;border-radius:50%;
  background:#0a1e3d;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:4rem;font-weight:800;
  color:#00d4ff;
  text-shadow:0 0 30px rgba(0,212,255,.5);
  overflow:hidden;
  position:relative;
}
.hero-pulse{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;border-radius:50%;
  border:2px solid #00d4ff30;
  animation:pulseRing 2s ease-out infinite;
}
.hero-pulse:nth-child(2){animation-delay:.5s}
.hero-pulse:nth-child(3){animation-delay:1s}
@keyframes pulseRing{
  0%{transform:translate(-50%,-50%) scale(1);opacity:.6}
  100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}
}
/* ====== ABOUT SECTION ====== */
.about-card{
  background:linear-gradient(135deg,rgba(0,30,70,.5),rgba(0,20,50,.3));
  border:1px solid rgba(0,212,255,.12);
  border-radius:20px;padding:50px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  display:grid;grid-template-columns:1fr 1fr;gap:40px;
}
.about-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#00d4ff,#0066ff,transparent);
}
.about-left h3{
  font-family:'Orbitron',sans-serif;
  font-size:1.1rem;color:#00d4ff;
  margin-bottom:20px;letter-spacing:2px;
}
.about-left p{
  font-size:.92rem;line-height:1.9;color:#8a9bb5;
}
.about-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  margin-top:30px;
}
.stat-item{
  background:rgba(0,212,255,.05);
  border:1px solid rgba(0,212,255,.1);
  border-radius:12px;padding:20px;text-align:center;
  transition:all .3s ease;
}
.stat-item:hover{
  border-color:#00d4ff;
  box-shadow:0 0 20px rgba(0,212,255,.15);
  transform:translateY(-3px);
}
.stat-value{
  font-family:'Orbitron',sans-serif;
  font-size:1.8rem;font-weight:700;
  color:#00d4ff;
}
.stat-label{
  font-size:.75rem;color:#8a9bb5;
  margin-top:4px;text-transform:uppercase;
  letter-spacing:1px;
}
.about-right{display:flex;flex-direction:column;gap:16px}
.about-detail{
  display:flex;align-items:center;gap:16px;
  background:rgba(0,212,255,.03);
  border:1px solid rgba(0,212,255,.08);
  border-radius:12px;padding:16px 20px;
  transition:all .3s ease;
}
.about-detail:hover{
  border-color:rgba(0,212,255,.25);
  background:rgba(0,212,255,.06);
}
.about-icon{
  width:44px;height:44px;border-radius:10px;
  background:rgba(0,212,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
  border:1px solid rgba(0,212,255,.15);
}
.about-detail-text h4{
  font-size:.85rem;color:#fff;font-weight:600;
  margin-bottom:2px;
}
.about-detail-text p{font-size:.8rem;color:#8a9bb5}
/* ====== EDUCATION ====== */
.timeline{position:relative;max-width:700px;margin:0 auto}
.timeline::before{
  content:'';position:absolute;left:50%;top:0;bottom:0;
  width:2px;transform:translateX(-50%);
  background:linear-gradient(180deg,#00d4ff20,#00d4ff,#0066ff,#00d4ff20);
  box-shadow:0 0 10px #00d4ff40;
}
.timeline-item{
  position:relative;width:45%;
  margin-bottom:50px;
}
.timeline-item:nth-child(odd){margin-left:5%}
.timeline-item:nth-child(even){margin-left:50%}
.timeline-dot{
  position:absolute;top:20px;width:16px;height:16px;
  border-radius:50%;background:#00d4ff;
  border:3px solid #06142E;z-index:2;
  box-shadow:0 0 15px #00d4ff;
}
.timeline-item:nth-child(odd) .timeline-dot{right:-36px}
.timeline-item:nth-child(even) .timeline-dot{left:-36px}
.timeline-card{
  background:linear-gradient(135deg,rgba(0,30,70,.4),rgba(0,20,50,.2));
  border:1px solid rgba(0,212,255,.12);
  border-radius:16px;padding:28px;
  backdrop-filter:blur(10px);
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.timeline-card:hover{
  border-color:#00d4ff;
  box-shadow:0 0 30px rgba(0,212,255,.15);
  transform:scale(1.03);
}
.timeline-year{
  font-family:'Orbitron',sans-serif;
  font-size:.75rem;color:#ffcc00;
  letter-spacing:2px;margin-bottom:8px;
}
.timeline-card h3{
  font-size:1rem;color:#fff;font-weight:600;
  margin-bottom:6px;
}
.timeline-card p{font-size:.85rem;color:#8a9bb5}
.timeline-badge{
  display:inline-block;
  background:rgba(0,212,255,.1);
  border:1px solid rgba(0,212,255,.2);
  border-radius:20px;padding:4px 14px;
  font-size:.75rem;color:#00d4ff;
  margin-top:10px;font-weight:600;
}
/* ====== SKILLS ====== */
.skills-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
}
.skill-chip{
  background:linear-gradient(135deg,rgba(0,30,70,.5),rgba(0,20,50,.3));
  border:1px solid rgba(0,212,255,.1);
  border-radius:14px;padding:28px 20px;
  text-align:center;position:relative;
  overflow:hidden;cursor:none;
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.skill-chip::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(circle at 50% 0%,rgba(0,212,255,.08),transparent 70%);
  opacity:0;transition:opacity .4s;
}
.skill-chip:hover::before{opacity:1}
.skill-chip:hover{
  border-color:#00d4ff;
  box-shadow:0 0 25px rgba(0,212,255,.15),inset 0 0 25px rgba(0,212,255,.05);
  transform:translateY(-5px);
}
.chip-icon{
  width:48px;height:48px;margin:0 auto 14px;
  background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.15);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;
  transition:all .4s;
}
.skill-chip:hover .chip-icon{
  background:rgba(0,212,255,.15);
  border-color:#00d4ff;
  box-shadow:0 0 15px rgba(0,212,255,.3);
}
.skill-chip h4{
  font-size:.85rem;color:#fff;font-weight:600;
  margin-bottom:4px;
}
.skill-chip p{font-size:.7rem;color:#8a9bb5}
/* Chip LED */
.chip-led{
  position:absolute;top:10px;right:10px;
  width:6px;height:6px;border-radius:50%;
  background:#00d4ff;opacity:.3;
  transition:all .4s;
}
.skill-chip:hover .chip-led{
  opacity:1;
  box-shadow:0 0 8px #00d4ff;
  animation:ledBlink 1s ease infinite;
}
@keyframes ledBlink{
  0%,100%{opacity:1}50%{opacity:.4}
}
/* ====== PROJECTS ====== */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:28px}
.project-card{
  background:linear-gradient(135deg,rgba(0,30,70,.4),rgba(0,20,50,.2));
  border:1px solid rgba(0,212,255,.1);
  border-radius:20px;padding:36px;
  position:relative;overflow:hidden;
  transition:all .5s cubic-bezier(.4,0,.2,1);
  cursor:none;
}
.project-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#ffcc00,transparent);
  opacity:0;transition:opacity .4s;
}
.project-card:hover::before{opacity:1}
.project-card:hover{
  border-color:rgba(255,204,0,.3);
  box-shadow:0 8px 40px rgba(0,212,255,.1);
  transform:translateY(-8px);
}
.project-num{
  font-family:'Orbitron',sans-serif;
  font-size:.7rem;color:#ffcc00;
  letter-spacing:3px;margin-bottom:14px;
  opacity:.6;
}
.project-card h3{
  font-size:1.15rem;font-weight:700;
  margin-bottom:12px;
  color:#ffcc00;
  text-shadow:0 0 20px rgba(255,204,0,.2);
}
.project-card p{
  font-size:.85rem;color:#8a9bb5;line-height:1.8;
  margin-bottom:16px;
}
.project-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.project-tag{
  background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.15);
  border-radius:6px;padding:4px 12px;
  font-size:.7rem;color:#00d4ff;
  font-weight:500;
}
.project-features{list-style:none;margin-bottom:16px}
.project-features li{
  font-size:.82rem;color:#8a9bb5;
  padding:4px 0;padding-left:18px;
  position:relative;
}
.project-features li::before{
  content:'▸';position:absolute;left:0;color:#00d4ff;
}
/* Circuit traces on project cards */
.circuit-trace{
  position:absolute;bottom:0;right:0;
  width:120px;height:120px;opacity:.06;
  pointer-events:none;
}
/* ====== CERTIFICATIONS ====== */
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.cert-card{
  perspective:1000px;cursor:none;height:220px;
}
.cert-card-inner{
  position:relative;width:100%;height:100%;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.cert-card:hover .cert-card-inner{transform:rotateY(180deg)}
.cert-front,.cert-back{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;
  border-radius:16px;padding:30px;
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;
}
.cert-front{
  background:linear-gradient(135deg,rgba(0,30,70,.5),rgba(0,20,50,.3));
  border:1px solid rgba(0,212,255,.12);
  backdrop-filter:blur(10px);
}
.cert-back{
  background:linear-gradient(135deg,rgba(0,50,100,.6),rgba(0,30,70,.4));
  border:1px solid rgba(0,212,255,.25);
  transform:rotateY(180deg);
}
.cert-badge{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,100,255,.1));
  border:2px solid rgba(0,212,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:16px;
}
.cert-front h3{
  font-size:.95rem;color:#fff;font-weight:600;
  margin-bottom:8px;
}
.cert-front p{font-size:.78rem;color:#8a9bb5}
.cert-back h4{
  font-size:.9rem;color:#00d4ff;margin-bottom:8px;
  font-weight:600;
}
.cert-back p{font-size:.82rem;color:#C6C6C6;margin-bottom:6px}
.cert-verified{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,255,100,.1);
  border:1px solid rgba(0,255,100,.2);
  border-radius:20px;padding:4px 14px;
  font-size:.72rem;color:#00ff64;
  margin-top:10px;
}
/* ====== CONTACT ====== */
.contact-panel{
  background:linear-gradient(135deg,rgba(0,30,70,.4),rgba(0,20,50,.2));
  border:1px solid rgba(0,212,255,.12);
  border-radius:20px;padding:50px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  max-width:800px;margin:0 auto;
}
.contact-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#00ff64,transparent);
}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.contact-item{
  display:flex;align-items:center;gap:16px;
  background:rgba(0,212,255,.03);
  border:1px solid rgba(0,212,255,.08);
  border-radius:12px;padding:20px;
  transition:all .3s ease;cursor:none;
}
.contact-item:hover{
  border-color:#00d4ff;
  background:rgba(0,212,255,.08);
  transform:translateX(4px);
}
.contact-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(0,212,255,.1);
  border:1px solid rgba(0,212,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.contact-info h4{font-size:.85rem;color:#fff;font-weight:600;margin-bottom:2px}
.contact-info p{font-size:.8rem;color:#8a9bb5}
/* Status LEDs */
.led{
  display:inline-block;width:8px;height:8px;
  border-radius:50%;margin-right:8px;
}
.led-green{background:#00ff64;box-shadow:0 0 8px #00ff64}
.led-blue{background:#00d4ff;box-shadow:0 0 8px #00d4ff}
.led-yellow{background:#ffcc00;box-shadow:0 0 8px #ffcc00}
.led-blink{animation:ledBlink 1.5s ease infinite}
/* ====== FOOTER ====== */
.footer{
  position:relative;z-index:1;
  border-top:1px solid rgba(0,212,255,.1);
  padding:40px;text-align:center;
}
.footer-inner{max-width:1200px;margin:0 auto}
.footer p{font-size:.8rem;color:#8a9bb5}
.footer-line{
  width:100%;height:2px;
  background:repeating-linear-gradient(90deg,
    transparent,transparent 10px,
    rgba(0,212,255,.15) 10px,rgba(0,212,255,.15) 12px);
  margin-bottom:20px;
}
/* ====== EMO ROBOT ====== */
.emo-robot{
  position:fixed;bottom:20px;right:20px;
  z-index:999;pointer-events:none;
  transition:all .8s cubic-bezier(.4,0,.2,1);
}
.emo-body{
  width:60px;height:70px;position:relative;
}
.emo-head{
  width:50px;height:40px;
  background:linear-gradient(135deg,#1a2a4a,#0d1b35);
  border:2px solid #00d4ff50;
  border-radius:12px 12px 8px 8px;
  position:absolute;top:0;left:5px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 15px rgba(0,212,255,.15);
}
.emo-eye{
  width:8px;height:8px;
  background:#00d4ff;border-radius:50%;
  box-shadow:0 0 6px #00d4ff;
  transition:all .15s ease;
}
.emo-eye.blink{transform:scaleY(.1)}
.emo-torso{
  width:44px;height:24px;
  background:linear-gradient(135deg,#1a2a4a,#0d1b35);
  border:2px solid #00d4ff30;
  border-radius:4px 4px 8px 8px;
  position:absolute;top:38px;left:8px;
}
.emo-arm{
  width:6px;height:18px;
  background:#1a2a4a;
  border:1px solid #00d4ff30;
  border-radius:3px;
  position:absolute;top:40px;
  transition:transform .4s ease;
}
.emo-arm.left{left:0;transform-origin:top center}
.emo-arm.right{right:0;transform-origin:top center}
.emo-arm.wave{animation:waveArm 1s ease-in-out}
@keyframes waveArm{
  0%,100%{transform:rotate(0deg)}
  25%{transform:rotate(-30deg)}
  50%{transform:rotate(-20deg)}
  75%{transform:rotate(-35deg)}
}
.emo-leg{
  width:8px;height:10px;
  background:#1a2a4a;
  border:1px solid #00d4ff30;
  border-radius:0 0 4px 4px;
  position:absolute;top:60px;
}
.emo-leg.left{left:14px}
.emo-leg.right{right:14px}
.emo-antenna{
  width:2px;height:10px;
  background:#00d4ff;
  position:absolute;top:-10px;left:24px;
  border-radius:1px;
}
.emo-antenna::after{
  content:'';position:absolute;top:-4px;left:-3px;
  width:8px;height:8px;border-radius:50%;
  background:#00d4ff;
  box-shadow:0 0 8px #00d4ff;
  animation:antennaPulse 2s ease infinite;
}
@keyframes antennaPulse{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.2)}
}
/* Speech Bubble */
.speech-bubble{
  position:absolute;bottom:80px;right:0;
  background:rgba(6,20,46,.9);
  border:1px solid rgba(0,212,255,.3);
  border-radius:12px;padding:14px 18px;
  font-size:.75rem;color:#C6C6C6;
  max-width:220px;line-height:1.5;
  backdrop-filter:blur(15px);
  opacity:0;transform:translateY(10px) scale(.95);
  transition:all .4s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.speech-bubble.show{
  opacity:1;transform:translateY(0) scale(1);
}
.speech-bubble::after{
  content:'';position:absolute;bottom:-8px;right:20px;
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid rgba(0,212,255,.3);
}
/* ====== ANIMATIONS ====== */
.fade-up{opacity:0;transform:translateY(40px);transition:all .8s cubic-bezier(.4,0,.2,1)}
.fade-up.visible{opacity:1;transform:translateY(0)}
.fade-left{opacity:0;transform:translateX(-60px);transition:all .8s cubic-bezier(.4,0,.2,1)}
.fade-left.visible{opacity:1;transform:translateX(0)}
.fade-right{opacity:0;transform:translateX(60px);transition:all .8s cubic-bezier(.4,0,.2,1)}
.fade-right.visible{opacity:1;transform:translateX(0)}
.scale-in{opacity:0;transform:scale(.85);transition:all .6s cubic-bezier(.4,0,.2,1)}
.scale-in.visible{opacity:1;transform:scale(1)}
.rotate-in{opacity:0;transform:perspective(800px) rotateY(25deg);transition:all .8s cubic-bezier(.4,0,.2,1)}
.rotate-in.visible{opacity:1;transform:perspective(800px) rotateY(0)}
.flip-in{opacity:0;transform:perspective(800px) rotateX(30deg);transition:all .7s cubic-bezier(.4,0,.2,1)}
.flip-in.visible{opacity:1;transform:perspective(800px) rotateX(0)}
/* Stagger delays */
.delay-1{transition-delay:.1s}
.delay-2{transition-delay:.2s}
.delay-3{transition-delay:.3s}
.delay-4{transition-delay:.4s}
.delay-5{transition-delay:.5s}
.delay-6{transition-delay:.6s}
.delay-7{transition-delay:.7s}
.delay-8{transition-delay:.8s}
/* ====== RESPONSIVE ====== */
@media(max-width:1024px){
  .hero-content{flex-direction:column-reverse;text-align:center;gap:40px}
  .hero-cta{justify-content:center}
  .hero-desc{margin:0 auto 40px}
  .about-card{grid-template-columns:1fr}
  .hero-image-wrapper{width:240px;height:240px}
}
@media(max-width:768px){
  .section{padding:100px 20px 60px}
  .hero-content{padding:0 20px}
  .about-card{padding:30px}
  .timeline-item{width:85%;margin-left:10%!important}
  .timeline::before{left:8px}
  .timeline-dot{left:-24px!important;right:auto!important}
  .projects-grid{grid-template-columns:1fr}
  .contact-grid{grid-template-columns:1fr}
  .skills-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
  .contact-panel{padding:30px 20px}
  .emo-robot{transform:scale(.8);bottom:10px;right:10px}
}
@media(max-width:480px){
  .hero-name{font-size:2rem}
  .hero-image-wrapper{width:180px;height:180px}
  .about-stats{grid-template-columns:1fr}
  .certs-grid{grid-template-columns:1fr}
}
/* ====== MOUSE GLOW ====== */
.mouse-glow{
  position:fixed;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.06),transparent 70%);
  pointer-events:none;z-index:0;
  transform:translate(-50%,-50%);
  transition:left .3s ease,top .3s ease;
}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
/* ============================
   DATA
   ============================ */
const NAV_ITEMS = ['Home','About','Education','Skills','Projects','Certifications','Contact'];
const TYPED_STRINGS = [
  'Electrical Engineer',
  'Embedded Systems Developer',
  'IoT Enthusiast',
  'Problem Solver',
  'Tech Innovator'
];
const EDUCATION = [
  {year:'2021 – 2025', title:'B.E Electrical & Electronics Engineering', place:'P.A College of Engineering and Technology', badge:'CGPA 8.06'},
  {year:'2019 – 2021', title:'Higher Secondary Education', place:'Board of Higher Secondary Examination', badge:'71.16%'},
  {year:'2019', title:'Secondary School Education (SSLC)', place:'Board of Secondary Education', badge:'100%'},
];
const SKILLS = [
  {name:'Python',icon:'🐍',cat:'Programming'},
  {name:'C++',icon:'⚡',cat:'Programming'},
  {name:'MATLAB',icon:'📊',cat:'Simulation'},
  {name:'AutoCAD',icon:'📐',cat:'Design'},
  {name:'ESP32',icon:'🔌',cat:'Microcontroller'},
  {name:'Arduino IDE',icon:'🛠️',cat:'Platform'},
  {name:'Raspberry Pi Pico',icon:'🍓',cat:'Microcontroller'},
  {name:'Embedded Systems',icon:'💾',cat:'Core'},
  {name:'Digital Electronics',icon:'🔧',cat:'Core'},
  {name:'Electrical Machines',icon:'⚙️',cat:'Core'},
  {name:'Power Systems',icon:'🔋',cat:'Core'},
  {name:'MS Office',icon:'📝',cat:'Tools'},
];
const PROJECTS = [
  {
    num:'01',title:'Smart Blind Stick',
    desc:'An assistive device for the visually impaired using ultrasonic sensors, vibration motors, and buzzer alerts. Detects obstacles in real-time and provides haptic & audio feedback for safe navigation.',
    tags:['ESP32','Ultrasonic Sensor','IoT','C++'],
    features:['Real-time obstacle detection','Haptic feedback via vibration motors','Audio alerts with buzzer','Compact & lightweight design'],
    problem:'Helps visually impaired individuals navigate independently and safely.',
    future:'GPS integration, voice-assisted navigation, mobile app connectivity.'
  },
  {
    num:'02',title:'ESP32 Quadcopter',
    desc:'A custom-built quadcopter drone powered by ESP32 microcontroller. Features wireless control, flight stabilization using PID algorithms, and real-time telemetry via Wi-Fi.',
    tags:['ESP32','PID Control','Drone','Embedded C'],
    features:['Wireless remote control','PID-based flight stabilization','Real-time telemetry','Custom PCB design'],
    problem:'Demonstrates autonomous flight control and embedded system integration.',
    future:'Camera integration, autonomous waypoint navigation, FPV capability.'
  },
  {
    num:'03',title:'Electrical Circuit Analysis using MATLAB',
    desc:'A comprehensive simulation project analyzing electrical circuits using MATLAB/Simulink. Covers AC/DC analysis, transient response, frequency domain analysis, and power calculations.',
    tags:['MATLAB','Simulink','Circuit Analysis','Power Systems'],
    features:['AC & DC circuit simulation','Transient response analysis','Frequency domain plotting','Automated report generation'],
    problem:'Simplifies complex circuit analysis with automated computation and visualization.',
    future:'GUI-based input, more circuit topologies, real-time hardware interfacing.'
  }
];
const CERTIFICATIONS = [
  {title:'ChatGPT for Beginners',issuer:'GUVI',year:'2024',icon:'🤖'},
  {title:'Basics of Python',issuer:'Infosys Springboard',year:'2024',icon:'🐍'},
  {title:'Understanding Design',issuer:'NPTEL',year:'2023',icon:'🎨'},
  {title:'AutoCAD Certification',issuer:'Autodesk',year:'2023',icon:'📐'},
];
const ROBOT_MESSAGES = {
  Home: "Hello! Welcome to Nithin's engineering portfolio. I'm EMO, your guide! 🤖",
  About: "This section introduces Nithin — his background, goals, and passion for engineering.",
  Education: "These are Nithin's academic achievements. Impressive scores! 📚",
  Skills: "These are the technologies and tools Nithin works with. ⚡",
  Projects: "These projects demonstrate practical engineering skills and innovation. 🔧",
  Certifications: "These certifications validate his continuous learning journey. 🏆",
  Contact: "You can reach out to Nithin from here. He'd love to connect! 📬"
};
/* ============================
   MAIN APP
   ============================ */
function App() {
  const [scrollY, setScrollY] = useState(0);
  const [scrollPct, setScrollPct] = useState(0);
  const [activeSection, setActiveSection] = useState('Home');
  const [mousePos, setMousePos] = useState({x:0,y:0});
  const [navOpen, setNavOpen] = useState(false);
  const [typedText, setTypedText] = useState('');
  const [typedIdx, setTypedIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [isDeleting, setIsDeleting] = useState(false);
  const [visibleEls, setVisibleEls] = useState(new Set());
  const [robotMsg, setRobotMsg] = useState('');
  const [robotShow, setRobotShow] = useState(false);
  const [robotWave, setRobotWave] = useState(false);
  const [robotBlink, setRobotBlink] = useState(false);
  const [eyeOffset, setEyeOffset] = useState({x:0,y:0});
  const canvasRef = useRef(null);
  const circuitRef = useRef(null);
  const sectionRefs = useRef({});
  const hoverTimerRef = useRef(null);
  const lastSectionRef = useRef('');
  const trailRef = useRef([]);
  const particlesRef = useRef([]);
  const animFrameRef = useRef(null);
  /* Typing Animation */
  useEffect(()=>{
    const current = TYPED_STRINGS[typedIdx];
    let timeout;
    if(!isDeleting && charIdx < current.length){
      timeout = setTimeout(()=>setCharIdx(c=>c+1),80);
    } else if(!isDeleting && charIdx === current.length){
      timeout = setTimeout(()=>setIsDeleting(true),1800);
    } else if(isDeleting && charIdx > 0){
      timeout = setTimeout(()=>setCharIdx(c=>c-1),40);
    } else if(isDeleting && charIdx === 0){
      setIsDeleting(false);
      setTypedIdx(i=>(i+1)%TYPED_STRINGS.length);
    }
    setTypedText(current.substring(0,charIdx));
    return ()=>clearTimeout(timeout);
  },[charIdx,isDeleting,typedIdx]);
  /* Scroll handler */
  useEffect(()=>{
    const onScroll = ()=>{
      const sy = window.scrollY;
      setScrollY(sy);
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      setScrollPct(docH > 0 ? (sy/docH)*100 : 0);
      // Active section
      const sections = NAV_ITEMS.map(n=>({name:n,el:sectionRefs.current[n]})).filter(s=>s.el);
      for(let i=sections.length-1;i>=0;i--){
        const rect = sections[i].el.getBoundingClientRect();
        if(rect.top <= 200){
          setActiveSection(sections[i].name);
          break;
        }
      }
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return ()=>window.removeEventListener('scroll',onScroll);
  },[]);
  /* Intersection Observer */
  useEffect(()=>{
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          setVisibleEls(prev=>{
            const next = new Set(prev);
            next.add(e.target.dataset.anim);
            return next;
          });
        }
      });
    },{threshold:0.15,rootMargin:'0px 0px -50px 0px'});
    document.querySelectorAll('[data-anim]').forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[scrollY]);
  /* Mouse tracking */
  useEffect(()=>{
    const onMove = (e)=>{
      setMousePos({x:e.clientX,y:e.clientY});
      // Robot eye tracking
      const rx = (e.clientX / window.innerWidth - 0.5) * 4;
      const ry = (e.clientY / window.innerHeight - 0.5) * 4;
      setEyeOffset({x:rx,y:ry});
      // Robot section hover
      const sections = NAV_ITEMS.map(n=>({name:n,el:sectionRefs.current[n]})).filter(s=>s.el);
      let hoveredSection = '';
      for(const s of sections){
        const rect = s.el.getBoundingClientRect();
        if(e.clientY >= rect.top && e.clientY <= rect.bottom){
          hoveredSection = s.name;
          break;
        }
      }
      if(hoveredSection && hoveredSection !== lastSectionRef.current){
        lastSectionRef.current = hoveredSection;
        clearTimeout(hoverTimerRef.current);
        hoverTimerRef.current = setTimeout(()=>{
          setRobotMsg(ROBOT_MESSAGES[hoveredSection]||'');
          setRobotShow(true);
          setRobotWave(true);
          setTimeout(()=>setRobotWave(false),1000);
          setTimeout(()=>setRobotShow(false),4000);
        },800);
      }
    };
    window.addEventListener('mousemove',onMove,{passive:true});
    return ()=>{window.removeEventListener('mousemove',onMove);clearTimeout(hoverTimerRef.current)};
  },[]);
  /* Robot blink */
  useEffect(()=>{
    const interval = setInterval(()=>{
      setRobotBlink(true);
      setTimeout(()=>setRobotBlink(false),150);
    },3000);
    return ()=>clearInterval(interval);
  },[]);
  /* Custom cursor */
  useEffect(()=>{
    const cursor = document.getElementById('custom-cursor');
    const trail = document.getElementById('cursor-trail');
    if(!cursor||!trail) return;
    const dots = [];
    for(let i=0;i<12;i++){
      const dot = document.createElement('div');
      dot.className='trail-dot';
      trail.appendChild(dot);
      dots.push({el:dot,x:0,y:0});
    }
    let mx=0,my=0;
    const onMove=(e)=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx-12+'px';cursor.style.top=my-12+'px'};
    window.addEventListener('mousemove',onMove,{passive:true});
    const anim=()=>{
      let px=mx,py=my;
      dots.forEach((d,i)=>{
        d.x+=(px-d.x)*.25;
        d.y+=(py-d.y)*.25;
        d.el.style.left=d.x-2+'px';
        d.el.style.top=d.y-2+'px';
        d.el.style.opacity=Math.max(0,(1-i/dots.length)*.6);
        d.el.style.transform=`scale(${1-i/dots.length})`;
        px=d.x;py=d.y;
      });
      requestAnimationFrame(anim);
    };
    anim();
    return ()=>window.removeEventListener('mousemove',onMove);
  },[]);
  /* Particle Canvas */
  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let w,h;
    const resize=()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight};
    resize();
    window.addEventListener('resize',resize);
    // Particles
    const particles = [];
    for(let i=0;i<60;i++){
      particles.push({
        x:Math.random()*w,y:Math.random()*h,
        vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
        r:Math.random()*2+.5,
        o:Math.random()*.3+.1
      });
    }
    // Circuit nodes
    const nodes = [];
    const spacing = 120;
    for(let x=0;x<w;x+=spacing){
      for(let y=0;y<h;y+=spacing){
        nodes.push({
          x:x+Math.random()*40-20,
          y:y+Math.random()*40-20,
          connections:[]
        });
      }
    }
    // Connect nearby nodes
    nodes.forEach((n,i)=>{
      nodes.forEach((m,j)=>{
        if(i!==j){
          const dist=Math.hypot(n.x-m.x,n.y-m.y);
          if(dist<spacing*1.5 && n.connections.length<3){
            n.connections.push(j);
          }
        }
      });
    });
    let pulseT=0;
    const animate=()=>{
      ctx.clearRect(0,0,w,h);
      pulseT+=.005;
      // Draw circuit traces
      ctx.lineWidth=.5;
      nodes.forEach((n)=>{
        n.connections.forEach(ci=>{
          const m=nodes[ci];
          ctx.beginPath();
          ctx.moveTo(n.x,n.y);
          // Right-angle traces
          if(Math.random()>.5){
            ctx.lineTo(m.x,n.y);
            ctx.lineTo(m.x,m.y);
          } else {
            ctx.lineTo(n.x,m.y);
            ctx.lineTo(m.x,m.y);
          }
          ctx.strokeStyle='rgba(0,212,255,.04)';
          ctx.stroke();
        });
      });
      // Draw nodes
      nodes.forEach((n,i)=>{
        const pulse=Math.sin(pulseT+i*.1)*.5+.5;
        ctx.beginPath();
        ctx.arc(n.x,n.y,1.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,212,255,${.05+pulse*.05})`;
        ctx.fill();
      });
      // Draw floating particles
      particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        if(p.x<0)p.x=w;if(p.x>w)p.x=0;
        if(p.y<0)p.y=h;if(p.y>h)p.y=0;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,212,255,${p.o})`;
        ctx.fill();
      });
      // Connect nearby particles
      for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){
          const dist=Math.hypot(particles[i].x-particles[j].x,particles[i].y-particles[j].y);
          if(dist<150){
            ctx.beginPath();
            ctx.moveTo(particles[i].x,particles[i].y);
            ctx.lineTo(particles[j].x,particles[j].y);
            ctx.strokeStyle=`rgba(0,212,255,${.05*(1-dist/150)})`;
            ctx.lineWidth=.5;
            ctx.stroke();
          }
        }
      }
      animFrameRef.current = requestAnimationFrame(animate);
    };
    animate();
    return ()=>{
      window.removeEventListener('resize',resize);
      cancelAnimationFrame(animFrameRef.current);
    };
  },[]);
  const scrollTo = (id)=>{
    const el = sectionRefs.current[id];
    if(el) el.scrollIntoView({behavior:'smooth'});
    setNavOpen(false);
  };
  const isVis = (id)=>visibleEls.has(id);
  return (
    <React.Fragment>
      {/* Ambient Background */}
      <canvas ref={canvasRef} id="particles-canvas"/>
      {/* Mouse reactive glow */}
      <div className="mouse-glow" style={{left:mousePos.x,top:mousePos.y}}/>
      {/* Floating glow shapes */}
      <div className="glow-shape" style={{width:500,height:500,background:'#0066ff',top:'10%',left:'5%',animationDelay:'0s'}}/>
      <div className="glow-shape" style={{width:400,height:400,background:'#00d4ff',top:'60%',right:'10%',animationDelay:'5s'}}/>
      <div className="glow-shape" style={{width:300,height:300,background:'#ffcc0040',bottom:'20%',left:'30%',animationDelay:'10s'}}/>
      {/* Custom Cursor SVG */}
      <div id="custom-cursor">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="none" stroke="#00d4ff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)"/>
          <defs><filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        </svg>
      </div>
      <div id="cursor-trail"/>
      {/* Scroll Indicator */}
      <div className="scroll-indicator" style={{width:`${scrollPct}%`}}/>
      {/* Navbar */}
      <nav className={`navbar ${scrollY > 50 ? 'scrolled' : ''}`}>
        <div className="nav-inner">
          <div className="nav-logo" onClick={()=>scrollTo('Home')}>N<span>.</span>M</div>
          <button className="nav-toggle" onClick={()=>setNavOpen(!navOpen)} aria-label="Toggle navigation">
            <span/><span/><span/>
          </button>
          <ul className={`nav-links ${navOpen?'open':''}`}>
            {NAV_ITEMS.map(item=>(
              <li key={item} className={`nav-link ${activeSection===item?'active':''}`} onClick={()=>scrollTo(item)}>
                {item}
              </li>
            ))}
          </ul>
        </div>
      </nav>
      {/* ====== HERO ====== */}
      <section className="hero section" id="Home" ref={el=>sectionRefs.current['Home']=el}>
        <div className="hero-content">
          <div className="hero-text">
            <p className="hero-greeting">SYSTEM INITIALIZED</p>
            <h1 className="hero-name">
              NITHIN <span className="highlight">M</span>
            </h1>
            <div className="hero-role">
              <span className="typed-text">{typedText}</span>
              <span className="typed-cursor"/>
            </div>
            <p className="hero-desc">
              Motivated and detail-oriented Electrical & Electronics Engineering undergraduate with a strong foundation in power systems, embedded systems, and programming. Building innovative engineering solutions.
            </p>
            <div className="hero-cta">
              <button className="btn btn-primary" onClick={()=>scrollTo('Projects')}>
                ⚡ View Projects
              </button>
              <button className="btn btn-secondary" onClick={()=>scrollTo('Contact')}>
                📡 Contact Me
              </button>
            </div>
          </div>
          <div className="hero-image-wrapper">
            <div className="hero-pulse"/><div className="hero-pulse"/><div className="hero-pulse"/>
            <div className="hero-image-frame">
              <div className="hero-image-inner">
                NM
              </div>
            </div>
          </div>
        </div>
      </section>
      {/* ====== ABOUT ====== */}
      <section className="section" id="About" ref={el=>sectionRefs.current['About']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="about-title">
            <span className={`fade-up ${isVis('about-title')?'visible':''}`}>System Profile</span>
          </h2>
          <div className={`about-card fade-left ${isVis('about-card')?'visible':''}`} data-anim="about-card">
            <div className="about-left">
              <h3>▸ CAREER OBJECTIVE</h3>
              <p>
                Motivated and detail-oriented Electrical and Electronics Engineering undergraduate with a strong foundation in power systems, electrical machines, embedded systems, and programming. Seeking opportunities to contribute technical expertise while continuously learning and building innovative engineering solutions.
              </p>
              <div className="about-stats">
                <div className="stat-item">
                  <div className="stat-value">8.06</div>
                  <div className="stat-label">CGPA</div>
                </div>
                <div className="stat-item">
                  <div className="stat-value">3+</div>
                  <div className="stat-label">Projects</div>
                </div>
                <div className="stat-item">
                  <div className="stat-value">12+</div>
                  <div className="stat-label">Skills</div>
                </div>
                <div className="stat-item">
                  <div className="stat-value">4</div>
                  <div className="stat-label">Certifications</div>
                </div>
              </div>
            </div>
            <div className="about-right">
              <div className="about-detail">
                <div className="about-icon">🎓</div>
                <div className="about-detail-text">
                  <h4>Education</h4>
                  <p>B.E in EEE — P.A College of Engineering</p>
                </div>
              </div>
              <div className="about-detail">
                <div className="about-icon">📍</div>
                <div className="about-detail-text">
                  <h4>Location</h4>
                  <p>Coimbatore, Tamil Nadu, India</p>
                </div>
              </div>
              <div className="about-detail">
                <div className="about-icon">⚡</div>
                <div className="about-detail-text">
                  <h4>Specialization</h4>
                  <p>Embedded Systems, IoT, Power Systems</p>
                </div>
              </div>
              <div className="about-detail">
                <div className="about-icon">🔬</div>
                <div className="about-detail-text">
                  <h4>Focus Areas</h4>
                  <p>Microcontrollers, Circuit Design, Automation</p>
                </div>
              </div>
              <div className="about-detail">
                <div className="about-icon">💡</div>
                <div className="about-detail-text">
                  <h4>Passion</h4>
                  <p>Building innovative engineering solutions</p>
                </div>
              </div>
              <div className="about-detail">
                <div className="about-icon">🌐</div>
                <div className="about-detail-text">
                  <h4>Status</h4>
                  <p><span className="led led-green led-blink"/>Open to Opportunities</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      {/* ====== EDUCATION ====== */}
      <section className="section" id="Education" ref={el=>sectionRefs.current['Education']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="edu-title">
            <span className={`fade-up ${isVis('edu-title')?'visible':''}`}>Education Protocol</span>
          </h2>
          <div className="timeline">
            {EDUCATION.map((edu,i)=>(
              <div key={i}
                className={`timeline-item fade-up ${isVis(`edu-${i}`)?'visible':''}`}
                data-anim={`edu-${i}`}
                style={{transitionDelay:`${i*.2}s`}}
              >
                <div className="timeline-dot"/>
                <div className="timeline-card">
                  <div className="timeline-year">{edu.year}</div>
                  <h3>{edu.title}</h3>
                  <p>{edu.place}</p>
                  <span className="timeline-badge">{edu.badge}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
      {/* ====== SKILLS ====== */}
      <section className="section" id="Skills" ref={el=>sectionRefs.current['Skills']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="skills-title">
            <span className={`fade-up ${isVis('skills-title')?'visible':''}`}>Tech Stack / Modules</span>
          </h2>
          <div className="skills-grid">
            {SKILLS.map((skill,i)=>(
              <div key={i}
                className={`skill-chip scale-in ${isVis(`skill-${i}`)?'visible':''}`}
                data-anim={`skill-${i}`}
                style={{transitionDelay:`${i*.08}s`}}
              >
                <div className="chip-led"/>
                <div className="chip-icon">{skill.icon}</div>
                <h4>{skill.name}</h4>
                <p>{skill.cat}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
      {/* ====== PROJECTS ====== */}
      <section className="section" id="Projects" ref={el=>sectionRefs.current['Projects']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="proj-title">
            <span className={`fade-up ${isVis('proj-title')?'visible':''}`}>Engineering Projects</span>
          </h2>
          <div className="projects-grid">
            {PROJECTS.map((proj,i)=>(
              <div key={i}
                className={`project-card rotate-in ${isVis(`proj-${i}`)?'visible':''}`}
                data-anim={`proj-${i}`}
                style={{transitionDelay:`${i*.15}s`}}
              >
                <div className="project-num">PROJECT {proj.num}</div>
                <h3>{proj.title}</h3>
                <p>{proj.desc}</p>
                <div className="project-tags">
                  {proj.tags.map((tag,ti)=><span key={ti} className="project-tag">{tag}</span>)}
                </div>
                <ul className="project-features">
                  {proj.features.map((f,fi)=><li key={fi}>{f}</li>)}
                </ul>
                <p style={{fontSize:'.8rem',color:'#ffcc00',marginBottom:8}}>
                  <strong>Problem Solved:</strong> <span style={{color:'#8a9bb5'}}>{proj.problem}</span>
                </p>
                <p style={{fontSize:'.8rem',color:'#00d4ff'}}>
                  <strong>Future:</strong> <span style={{color:'#8a9bb5'}}>{proj.future}</span>
                </p>
                {/* Circuit trace decoration */}
                <svg className="circuit-trace" viewBox="0 0 120 120">
                  <path d="M0 80 H40 V40 H80 V0" stroke="#00d4ff" fill="none" strokeWidth="1"/>
                  <path d="M20 120 V100 H60 V60 H100 V20" stroke="#00d4ff" fill="none" strokeWidth="1"/>
                  <circle cx="40" cy="40" r="3" fill="#00d4ff"/>
                  <circle cx="80" cy="0" r="3" fill="#00d4ff"/>
                  <circle cx="60" cy="60" r="3" fill="#00d4ff"/>
                </svg>
              </div>
            ))}
          </div>
        </div>
      </section>
      {/* ====== CERTIFICATIONS ====== */}
      <section className="section" id="Certifications" ref={el=>sectionRefs.current['Certifications']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="cert-title">
            <span className={`fade-up ${isVis('cert-title')?'visible':''}`}>Verified Certifications</span>
          </h2>
          <div className="certs-grid">
            {CERTIFICATIONS.map((cert,i)=>(
              <div key={i}
                className={`cert-card flip-in ${isVis(`cert-${i}`)?'visible':''}`}
                data-anim={`cert-${i}`}
                style={{transitionDelay:`${i*.15}s`}}
              >
                <div className="cert-card-inner">
                  <div className="cert-front">
                    <div className="cert-badge">{cert.icon}</div>
                    <h3>{cert.title}</h3>
                    <p>{cert.issuer}</p>
                  </div>
                  <div className="cert-back">
                    <h4>{cert.title}</h4>
                    <p><strong>Issuer:</strong> {cert.issuer}</p>
                    <p><strong>Year:</strong> {cert.year}</p>
                    <div className="cert-verified">
                      <span className="led led-green"/>Verified
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
      {/* ====== CONTACT ====== */}
      <section className="section" id="Contact" ref={el=>sectionRefs.current['Contact']=el}>
        <div className="section-inner">
          <h2 className="section-title" data-anim="contact-title">
            <span className={`fade-up ${isVis('contact-title')?'visible':''}`}>Communication Panel</span>
          </h2>
          <div className={`contact-panel fade-up ${isVis('contact-panel')?'visible':''}`} data-anim="contact-panel">
            <div style={{textAlign:'center',marginBottom:30}}>
              <p style={{fontSize:'.9rem',color:'#8a9bb5'}}>
                <span className="led led-green led-blink"/>System Online — Ready to Connect
              </p>
            </div>
            <div className="contact-grid">
              <a href="mailto:naduhattynithin@gmail.com" className="contact-item">
                <div className="contact-icon">📧</div>
                <div className="contact-info">
                  <h4>Email</h4>
                  <p>naduhattynithin@gmail.com</p>
                </div>
              </a>
              <div className="contact-item">
                <div className="contact-icon">📱</div>
                <div className="contact-info">
                  <h4>Phone</h4>
                  <p>+91 XXXXX XXXXX</p>
                </div>
              </div>
              <div className="contact-item">
                <div className="contact-icon">📍</div>
                <div className="contact-info">
                  <h4>Location</h4>
                  <p>Coimbatore, India</p>
                </div>
              </div>
              <a href="#" className="contact-item">
                <div className="contact-icon">💼</div>
                <div className="contact-info">
                  <h4>LinkedIn</h4>
                  <p>linkedin.com/in/nithin-m</p>
                </div>
              </a>
              <a href="#" className="contact-item">
                <div className="contact-icon">🐙</div>
                <div className="contact-info">
                  <h4>GitHub</h4>
                  <p>github.com/nithin-m</p>
                </div>
              </a>
              <div className="contact-item">
                <div className="contact-icon">🎓</div>
                <div className="contact-info">
                  <h4>College</h4>
                  <p>P.A College of Engineering</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      {/* ====== FOOTER ====== */}
      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-line"/>
          <p style={{fontFamily:"'Orbitron',sans-serif",fontSize:'.75rem',letterSpacing:2,color:'#00d4ff40',marginBottom:8}}>
            ━━━━ SYSTEM BOARD v1.0 ━━━━
          </p>
          <p>
            Designed & Engineered by <span style={{color:'#00d4ff'}}>Nithin M</span> · © 2025
          </p>
          <p style={{fontSize:'.7rem',marginTop:8,color:'#8a9bb540'}}>
            Built with React.js · All rights reserved
          </p>
        </div>
      </footer>
      {/* ====== EMO ROBOT ====== */}
      <div className="emo-robot">
        <div className={`speech-bubble ${robotShow?'show':''}`}>
          {robotMsg}
        </div>
        <div className="emo-body">
          <div className="emo-antenna"/>
          <div className="emo-head">
            <div className={`emo-eye ${robotBlink?'blink':''}`}
              style={{transform:`translate(${eyeOffset.x}px,${eyeOffset.y}px)`}}/>
            <div className={`emo-eye ${robotBlink?'blink':''}`}
              style={{transform:`translate(${eyeOffset.x}px,${eyeOffset.y}px)`}}/>
          </div>
          <div className={`emo-arm left ${robotWave?'wave':''}`}/>
          <div className="emo-arm right"/>
          <div className="emo-torso"/>
          <div className="emo-leg left"/>
          <div className="emo-leg right"/>
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
